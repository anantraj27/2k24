<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Anonymous Confession Wall</title>

    <link rel="stylesheet" href="./confession.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>    

</head>

<body>

<div class="container">

    <header>

        <h1>💌 Anonymous Confession Wall</h1>

        <p>
            No names. No judgments.
            Just your thoughts ❤️
        </p>

    </header>

    <section class="post-box">
        <div class="warning-box">
    ⚠️ <strong>Community Rules</strong><br>
    • No abusive language<br>
    • No sexual or explicit content<br>
    • No hate speech or threats<br>
    • No personal attacks or revealing someone's identity
    •⚠️ <strong>5 reports = Automatic removal</strong> from the confession wall.
</div>

        <textarea
            id="confession"
            maxlength="250"
            placeholder="Confess something... Nobody will know it's you 😌"></textarea>

        <div class="bottom">

            <span id="count">
                0 / 250
            </span>

            <button id="postBtn">

                <i class="fa-solid fa-paper-plane"></i>

                Post

            </button>

        </div>

    </section>

    <!-- Confessions will be loaded here -->
    <section class="feed" id="feed">

    </section>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script type="module" src="./confession.js"></script>

</body>

</html>
